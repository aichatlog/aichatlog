services:
  aichatlog-server:
    image: ghcr.io/aichatlog/aichatlog/server:latest
    ports:
      - "4180:8080"  # host:container — change 4180 to use a different host port
    volumes:
      - ./data:/app/data
    environment:
      - AICHATLOG_TOKEN=${AICHATLOG_TOKEN:-}
    restart: unless-stopped
