<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIChatLog Plugin</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script src="https://cdn.jsdelivr.net/npm/markdown-it@14/dist/markdown-it.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github-dark.min.css">
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/markdown-it-footnote@4/dist/markdown-it-footnote.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/markdown-it-texmath@1/texmath.min.js"></script>
<script>tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{mono:['JetBrains Mono','Fira Code','SF Mono','Menlo','monospace']}}}}</script>
<style>.tab-panel{display:none}.tab-panel.active{display:block}.modal-overlay{display:none}.modal-overlay.open{display:flex}
.md-content{font-size:14px;line-height:1.7}
.md-content h1,.md-content h2,.md-content h3{font-size:1em;font-weight:600;margin:0.5em 0 0.25em}
.md-content p{margin:0.3em 0}
.md-content ul,.md-content ol{margin:0.3em 0;padding-left:1.5em}
.md-content li{margin:0.1em 0}
.md-content table{border-collapse:collapse;margin:0.5em 0;font-size:13px;width:100%}
.md-content th,.md-content td{border:1px solid #d1d5db;padding:4px 10px;text-align:left}
.dark .md-content th,.dark .md-content td{border-color:#334155}
.md-content th{font-weight:600;background:#f3f4f6;color:#1f2937}
.dark .md-content th{background:#1e293b;color:#e2e8f0}
.md-content blockquote{border-left:3px solid #3b82f6;padding-left:12px;margin:0.5em 0;opacity:0.85}
.md-content pre{border-radius:8px;padding:12px;margin:0.5em 0;overflow-x:auto;font-size:13px}
.md-content code:not(pre code){background:rgba(100,116,139,0.2);padding:1px 5px;border-radius:4px;font-size:0.9em}
.md-content a{color:#3b82f6;text-decoration:underline}
.md-content .footnotes{font-size:12px;opacity:0.7;margin-top:1em;border-top:1px solid #334155;padding-top:0.5em}
.md-content .katex{font-size:1.1em}
</style>
</head>
<body class="bg-gray-50 dark:bg-slate-950 text-gray-900 dark:text-slate-100 min-h-screen antialiased transition-colors duration-200">
<div class="max-w-5xl mx-auto px-5 py-6">

<header class="flex items-center gap-3 mb-6">
  <h1 class="text-xl font-semibold tracking-tight">AIChatLog</h1>
  <span class="text-[10px] font-mono px-2 py-0.5 rounded bg-emerald-100 dark:bg-emerald-500/20 text-emerald-600 dark:text-emerald-400 uppercase tracking-wider">Plugin</span>
  <div class="flex-1"></div>
  <div class="flex gap-1">
    <button type="button" onclick="setTheme('auto')" class="theme-btn p-1.5 rounded border border-gray-300 dark:border-slate-700 text-gray-400 dark:text-slate-500 hover:text-gray-600 dark:hover:text-slate-300 transition-colors" title="Auto"><i data-lucide="monitor" class="w-3.5 h-3.5"></i></button>
    <button type="button" onclick="setTheme('light')" class="theme-btn p-1.5 rounded border border-gray-300 dark:border-slate-700 text-gray-400 dark:text-slate-500 hover:text-gray-600 dark:hover:text-slate-300 transition-colors" title="Light"><i data-lucide="sun" class="w-3.5 h-3.5"></i></button>
    <button type="button" onclick="setTheme('dark')" class="theme-btn p-1.5 rounded border border-gray-300 dark:border-slate-700 text-gray-400 dark:text-slate-500 hover:text-gray-600 dark:hover:text-slate-300 transition-colors" title="Dark"><i data-lucide="moon" class="w-3.5 h-3.5"></i></button>
  </div>
</header>

<nav class="flex gap-1 mb-6 border-b border-gray-200 dark:border-slate-800 pb-2">
  <button type="button" class="tab-btn flex items-center gap-2 px-4 py-2 text-sm rounded-t-lg text-gray-500 dark:text-slate-400 hover:text-gray-900 dark:hover:text-slate-200 hover:bg-gray-100 dark:hover:bg-slate-800/50 transition-colors" onclick="switchTab('conversations')" data-tab="conversations"><i data-lucide="message-square" class="w-4 h-4"></i> <span id="lTabConv">Conversations</span></button>
  <button type="button" class="tab-btn flex items-center gap-2 px-4 py-2 text-sm rounded-t-lg text-gray-500 dark:text-slate-400 hover:text-gray-900 dark:hover:text-slate-200 hover:bg-gray-100 dark:hover:bg-slate-800/50 transition-colors" onclick="switchTab('settings')" data-tab="settings"><i data-lucide="settings" class="w-4 h-4"></i> <span id="lTabSet">Settings</span></button>
</nav>

<!-- Conversations -->
<div id="tab-conversations" class="tab-panel active">
  <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-5" id="statsRow"></div>
  <div id="batchBar" class="hidden mb-3 items-center gap-3 px-4 py-2.5 rounded-xl bg-blue-50 dark:bg-blue-500/10 border border-blue-200 dark:border-blue-500/30">
    <span id="batchCount" class="text-xs font-medium text-blue-600 dark:text-blue-400"></span><div class="flex-1"></div>
    <button type="button" onclick="batchDo('sync')" class="flex items-center gap-1.5 px-3 py-1 text-xs rounded-lg bg-white dark:bg-slate-800 border border-blue-200 dark:border-blue-500/30 text-blue-600 dark:text-blue-400 transition-colors"><i data-lucide="upload-cloud" class="w-3 h-3"></i> Sync</button>
    <button type="button" onclick="batchDo('ignore')" class="flex items-center gap-1.5 px-3 py-1 text-xs rounded-lg bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 text-gray-600 dark:text-slate-300 transition-colors"><i data-lucide="eye-off" class="w-3 h-3"></i> Ignore</button>
    <button type="button" onclick="clrSel()" class="text-xs text-gray-400 dark:text-slate-500 ml-2">✕</button>
  </div>
  <div class="flex gap-3 mb-4 items-center">
    <div class="flex-1 relative">
      <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 dark:text-slate-500"></i>
      <input type="text" id="searchInput" placeholder="Search..." class="w-full pl-10 pr-4 py-2.5 bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 rounded-lg text-gray-900 dark:text-slate-200 text-sm placeholder-gray-400 dark:placeholder-slate-500 focus:outline-none focus:border-blue-500" oninput="onSearch()">
    </div>
    <div class="flex gap-1">
      <button class="ft px-3 py-1.5 text-xs rounded-lg border border-gray-200 dark:border-slate-700 text-gray-500 dark:text-slate-400 transition-colors" data-f="" onclick="setFilt('')">All</button>
      <button class="ft px-3 py-1.5 text-xs rounded-lg border border-gray-200 dark:border-slate-700 text-gray-500 dark:text-slate-400 transition-colors" data-f="unsynced" onclick="setFilt('unsynced')">Pending</button>
      <button class="ft px-3 py-1.5 text-xs rounded-lg border border-gray-200 dark:border-slate-700 text-gray-500 dark:text-slate-400 transition-colors" data-f="synced" onclick="setFilt('synced')">Synced</button>
      <button class="ft px-3 py-1.5 text-xs rounded-lg border border-gray-200 dark:border-slate-700 text-gray-500 dark:text-slate-400 transition-colors" data-f="ignored" onclick="setFilt('ignored')">Ignored</button>
    </div>
  </div>
  <div class="bg-white dark:bg-slate-900 rounded-xl border border-gray-200 dark:border-slate-800 overflow-hidden">
    <table class="w-full"><thead><tr class="border-b border-gray-200 dark:border-slate-800 text-xs font-medium text-gray-400 dark:text-slate-500">
      <th class="w-10 px-3 py-3"><input type="checkbox" title="Select all" id="selAll" onchange="togAll(this.checked)" class="w-3.5 h-3.5 accent-blue-500 cursor-pointer"></th>
      <th class="text-left px-4 py-3 cursor-pointer hover:text-gray-600 dark:hover:text-slate-300" onclick="setSort('date')">Date</th>
      <th class="text-left px-4 py-3 cursor-pointer hover:text-gray-600 dark:hover:text-slate-300" onclick="setSort('title')">Title</th>
      <th class="text-left px-4 py-3">Project</th>
      <th class="text-center px-4 py-3">Msgs</th>
      <th class="text-center px-4 py-3 cursor-pointer hover:text-gray-600 dark:hover:text-slate-300" onclick="setSort('word_count')">Words</th>
      <th class="text-left px-4 py-3">Status</th>
    </tr></thead><tbody id="tbody"></tbody></table>
  </div>
  <div class="flex justify-center gap-2 mt-4" id="pag"></div>
</div>

<!-- Settings -->
<div id="tab-settings" class="tab-panel"><div id="setForm"></div></div>
</div>

<!-- Modal -->
<div class="modal-overlay fixed inset-0 bg-black/50 dark:bg-black/60 z-50 justify-center items-start pt-10 px-5 overflow-y-auto" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="bg-white dark:bg-slate-900 border border-gray-200 dark:border-slate-800 rounded-2xl max-w-3xl w-full max-h-[calc(100vh-80px)] overflow-y-auto shadow-2xl">
    <div class="flex justify-between items-center px-6 py-4 border-b border-gray-200 dark:border-slate-800">
      <h2 id="mTitle" class="text-base font-semibold truncate"></h2>
      <button onclick="closeModal()" class="text-gray-400 dark:text-slate-500 hover:text-gray-700 dark:hover:text-slate-200 text-xl">&times;</button>
    </div>
    <div id="mMeta" class="flex flex-wrap gap-2 px-6 py-3 text-xs border-b border-gray-200 dark:border-slate-800"></div>
    <div id="mMsgs" class="flex flex-col gap-4 px-6 py-5"></div>
  </div>
</div>

<script>
const T={en:{conv:'Conversations',set:'Settings',all:'All',pending:'Pending',synced:'Synced',ignored:'Ignored',total:'Total',no:'No conversations found',sync:'Sync',resync:'Resync',ignore:'Ignore',restore:'Restore',basic:'Basic Settings',lang:'Language',device:'Device Name',syncDir:'Sync Directory',adapterSec:'Output Adapter',adapterType:'Type',url:'URL',token:'Token',vault:'Vault',path:'Path',repo:'Repo Path',autoPush:'Auto Push',save:'Save',test:'Test Connection',saved:'Saved!',testing:'Testing...',ok:'Connected!',fail:'Failed',prev:'Prev',next:'Next',page:'Page'},
'zh-CN':{conv:'对话',set:'设置',all:'全部',pending:'待同步',synced:'已同步',ignored:'已忽略',total:'总计',no:'没有找到对话',sync:'同步',resync:'重新同步',ignore:'忽略',restore:'恢复',basic:'基本设置',lang:'语言',device:'设备名称',syncDir:'同步目录',adapterSec:'输出适配器',adapterType:'类型',url:'URL',token:'Token',vault:'Vault 名称',path:'输出路径',repo:'仓库路径',autoPush:'自动推送',save:'保存',test:'测试连接',saved:'已保存！',testing:'测试中...',ok:'连接成功！',fail:'失败',prev:'上一页',next:'下一页',page:'第'},
'zh-TW':{conv:'對話',set:'設定',all:'全部',pending:'待同步',synced:'已同步',ignored:'已忽略',total:'總計',no:'沒有找到對話',sync:'同步',resync:'重新同步',ignore:'忽略',restore:'恢復',basic:'基本設定',lang:'語言',device:'裝置名稱',syncDir:'同步目錄',adapterSec:'輸出適配器',adapterType:'類型',url:'URL',token:'Token',vault:'Vault 名稱',path:'輸出路徑',repo:'倉庫路徑',autoPush:'自動推送',save:'儲存',test:'測試連線',saved:'已儲存！',testing:'測試中...',ok:'連線成功！',fail:'失敗',prev:'上一頁',next:'下一頁',page:'第'}};
let lang='en';
function t(k){return(T[lang]||T.en)[k]||T.en[k]||k;}
function applyLang(){document.getElementById('lTabConv').textContent=t('conv');document.getElementById('lTabSet').textContent=t('set');document.getElementById('searchInput').placeholder=t('conv')+'...';const ls=[t('all'),t('pending'),t('synced'),t('ignored')];document.querySelectorAll('.ft').forEach((b,i)=>{b.textContent=ls[i];});}

let theme='auto';
function setTheme(m){theme=m;localStorage.setItem('aichatlog-theme',m);applyTheme();updTheme();}
function applyTheme(){document.documentElement.classList.toggle('dark',theme==='dark'||(theme==='auto'&&matchMedia('(prefers-color-scheme:dark)').matches));}
function updTheme(){['auto','light','dark'].forEach((m,i)=>{const b=document.querySelectorAll('.theme-btn')[i];if(b){b.classList.toggle('!border-blue-500',m===theme);b.classList.toggle('!text-blue-500',m===theme);}});}
matchMedia('(prefers-color-scheme:dark)').addEventListener('change',()=>{if(theme==='auto')applyTheme();});

const PS=50;let st={f:'',q:'',sort:'date',ord:'desc',off:0},tmr=null;
async function api(p){return(await fetch('/api'+p)).json();}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
const SC=s=>({unsynced:'amber',synced:'emerald',ignored:'slate'}[s]||'slate');
const SL=s=>({unsynced:t('pending'),synced:t('synced'),ignored:t('ignored')}[s]||s);

async function loadStats(){const s=await api('/stats');const c=document.getElementById('statsRow');c.replaceChildren();
[{k:'',l:t('total'),v:s.total,co:'blue',ic:'layers'},{k:'unsynced',l:t('pending'),v:s.unsynced||0,co:'amber',ic:'clock'},{k:'synced',l:t('synced'),v:s.synced||0,co:'emerald',ic:'check-circle'},{k:'ignored',l:t('ignored'),v:s.ignored||0,co:'slate',ic:'eye-off'}].forEach(x=>{
const d=document.createElement('div');d.className=`bg-white dark:bg-slate-800/50 border border-gray-200 dark:border-slate-700/50 rounded-xl p-4 cursor-pointer hover:border-${x.co}-400 dark:hover:border-${x.co}-500/50 transition-all ${st.f===x.k?'!border-'+x.co+'-500':''}`;d.onclick=()=>setFilt(x.k);
d.innerHTML=`<div class="flex items-center gap-2 mb-1"><i data-lucide="${x.ic}" class="w-3.5 h-3.5 text-${x.co}-500"></i><span class="text-xs text-gray-500 dark:text-slate-400">${x.l}</span></div><div class="text-2xl font-bold font-mono text-${x.co}-500">${x.v}</div>`;c.appendChild(d);});lucide.createIcons();}

async function loadList(){const p=new URLSearchParams();if(st.f)p.set('status',st.f);if(st.q)p.set('q',st.q);p.set('sort',st.sort);p.set('order',st.ord);p.set('limit',PS);p.set('offset',st.off);
const rows=await api('/conversations?'+p);const tb=document.getElementById('tbody');tb.replaceChildren();
if(!rows.length){const tr=document.createElement('tr'),td=document.createElement('td');td.colSpan=7;td.className='text-center py-16 text-gray-400 dark:text-slate-500';td.textContent=t('no');tr.appendChild(td);tb.appendChild(tr);document.getElementById('pag').replaceChildren();return;}
rows.forEach(c=>{const tr=document.createElement('tr');tr.className='border-b border-gray-100 dark:border-slate-800/50 hover:bg-gray-50 dark:hover:bg-slate-800/30 cursor-pointer transition-colors';tr.onclick=e=>{if(e.target.type!=='checkbox')showDetail(c.session_id);};const co=SC(c.status);
tr.innerHTML=`<td class="w-10 px-3 py-3"><input type="checkbox" title="Select" data-id="${c.session_id}" onchange="updSel()" class="rck w-3.5 h-3.5 accent-blue-500 cursor-pointer"></td><td class="px-4 py-3 text-xs font-mono text-gray-500 dark:text-slate-400 whitespace-nowrap">${esc(c.date)}</td><td class="px-4 py-3 text-sm text-gray-900 dark:text-slate-200 max-w-[280px] truncate">${esc(c.title)}</td><td class="px-4 py-3 text-sm text-gray-500 dark:text-slate-400">${esc(c.project)||'—'}</td><td class="px-4 py-3 text-xs font-mono text-gray-500 dark:text-slate-400 text-center">${c.message_count}</td><td class="px-4 py-3 text-xs font-mono text-gray-500 dark:text-slate-400 text-center">${c.word_count}</td><td class="px-4 py-3"><span class="text-[10px] font-mono px-2 py-0.5 rounded-full bg-${co}-50 dark:bg-${co}-500/10 text-${co}-600 dark:text-${co}-400">${SL(c.status)}</span></td>`;tb.appendChild(tr);});
const pg=document.getElementById('pag');pg.replaceChildren();const page=Math.floor(st.off/PS),hn=rows.length===PS;const mb=(tx,dis,fn)=>{const b=document.createElement('button');b.className='px-3 py-1.5 text-xs rounded-lg border border-gray-200 dark:border-slate-700 text-gray-500 dark:text-slate-400 disabled:opacity-30';b.textContent=tx;b.disabled=dis;if(fn)b.onclick=fn;return b;};pg.append(mb(t('prev'),page===0,()=>{st.off=(page-1)*PS;loadList();}),mb(t('page')+' '+(page+1),true),mb(t('next'),!hn,()=>{st.off=(page+1)*PS;loadList();}));}

function setFilt(f){st.f=f;st.off=0;document.querySelectorAll('.ft').forEach(b=>{const a=(b.dataset.f||'')===f;b.classList.toggle('!border-blue-500',a);b.classList.toggle('!text-blue-500',a);b.classList.toggle('!bg-blue-50',a);b.classList.toggle('dark:!bg-blue-500/10',a);});loadStats();loadList();}
function setSort(c){if(st.sort===c)st.ord=st.ord==='desc'?'asc':'desc';else{st.sort=c;st.ord='desc';}st.off=0;loadList();}
function onSearch(){clearTimeout(tmr);tmr=setTimeout(()=>{st.q=document.getElementById('searchInput').value.trim();st.off=0;loadList();},300);}

function getIds(){return Array.from(document.querySelectorAll('.rck:checked')).map(c=>c.dataset.id);}
function updSel(){const ids=getIds();const bar=document.getElementById('batchBar');if(ids.length){bar.classList.remove('hidden');bar.classList.add('flex');document.getElementById('batchCount').textContent=ids.length+' selected';}else{bar.classList.add('hidden');bar.classList.remove('flex');}document.getElementById('selAll').checked=document.querySelectorAll('.rck').length>0&&ids.length===document.querySelectorAll('.rck').length;}
function togAll(c){document.querySelectorAll('.rck').forEach(cb=>{cb.checked=c;});updSel();}
function clrSel(){togAll(false);}
async function batchDo(act){const ids=getIds();if(!ids.length)return;for(const id of ids){await fetch('/api/'+(act==='sync'?'sync':'ignore'),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:id})});}clrSel();loadStats();loadList();}

async function showDetail(sid){const c=await api('/conversations/'+encodeURIComponent(sid)+'?full=true');
document.getElementById('mTitle').textContent=c.title;const meta=document.getElementById('mMeta');meta.replaceChildren();
const chip=(tx,cls)=>{const s=document.createElement('span');s.className='px-2 py-0.5 rounded text-[11px] '+(cls||'bg-gray-100 dark:bg-slate-800 text-gray-600 dark:text-slate-400');s.textContent=tx;meta.appendChild(s);};
chip(c.date);if(c.project)chip(c.project);chip(c.message_count+' msgs / '+c.word_count+' words');
const co=SC(c.status);chip(SL(c.status),`bg-${co}-50 dark:bg-${co}-500/10 text-${co}-600 dark:text-${co}-400`);
const ctr=document.getElementById('mMsgs');ctr.replaceChildren();
// markdown-it + highlight.js + DOMPurify rendering
const md=window.markdownit({html:false,linkify:true,typographer:true,highlight:function(str,lang){if(lang&&hljs.getLanguage(lang)){try{return hljs.highlight(str,{language:lang}).value;}catch(e){}}try{return hljs.highlightAuto(str).value;}catch(e){}return'';}});
if(window.markdownitFootnote)md.use(window.markdownitFootnote);
if(window.texmath)md.use(window.texmath,{engine:katex,delimiters:'dollars'});
function sxt(tx){tx=tx.replace(/<(system-reminder|ide_selection|available-deferred-tools|task-notification|gitStatus)>[\s\S]*?<\/\1>/g,function(_,tag){return'\n`['+tag+']`\n';});tx=tx.replace(/<ide_opened_file>[^<]*<\/ide_opened_file>/g,function(m){var f=m.match(/file\s+([^\s]+)/);return f?'`[Opened: '+f[1].split('/').pop()+']`':'`[file opened]`';});tx=tx.replace(/<[a-z_-]+(?:\s[^>]*)?>|<\/[a-z_-]+>/gi,'');return tx;}
function rc(p,tx){if(!tx)return;tx=sxt(tx);var html=DOMPurify.sanitize(md.render(tx));var d=document.createElement('div');d.className='md-content';d.innerHTML=html;p.appendChild(d);}
(c.messages||[]).filter(m=>!m.is_context).forEach(m=>{const isU=m.role==='user';const d=document.createElement('div');d.className='max-w-[85%] flex flex-col '+(isU?'self-end':'self-start');
const hd=document.createElement('div');hd.className='flex items-center gap-2 mb-1 text-[11px] '+(isU?'justify-end text-blue-500':'text-emerald-500');hd.textContent=isU?'User':'Assistant';if(m.time_str){const ts=document.createElement('span');ts.className='text-gray-400 dark:text-slate-500';ts.textContent=m.time_str;hd.appendChild(ts);}d.appendChild(hd);
const bb=document.createElement('div');bb.className=isU?'rounded-2xl rounded-br-sm px-4 py-3 bg-blue-500 text-white text-sm leading-relaxed':'rounded-2xl rounded-bl-sm px-4 py-3 bg-gray-100 dark:bg-slate-800 text-gray-900 dark:text-slate-200 text-sm leading-relaxed border border-gray-200 dark:border-slate-700/50';
if(isU)bb.textContent=m.content;else rc(bb,m.content);d.appendChild(bb);ctr.appendChild(d);});
const acts=document.createElement('div');acts.className='px-6 py-3 border-t border-gray-200 dark:border-slate-800 flex gap-2';
const ab=(tx,ic,cls,fn)=>{const b=document.createElement('button');b.className='flex items-center gap-1.5 px-3 py-1.5 text-xs rounded-lg border transition-colors '+(cls||'border-gray-200 dark:border-slate-700 text-gray-500 dark:text-slate-400');b.innerHTML=`<i data-lucide="${ic}" class="w-3.5 h-3.5"></i> ${tx}`;b.onclick=fn;return b;};
if(c.status==='unsynced')acts.appendChild(ab(t('sync'),'upload-cloud','border-blue-200 dark:border-blue-500/30 text-blue-500',async()=>{await fetch('/api/sync',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sid})});closeModal();loadStats();loadList();}));
if(c.status==='synced')acts.appendChild(ab(t('resync'),'refresh-cw','',async()=>{await fetch('/api/resync',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sid})});closeModal();loadStats();loadList();}));
acts.appendChild(ab(c.status==='ignored'?t('restore'):t('ignore'),c.status==='ignored'?'eye':'eye-off','',async()=>{await fetch(c.status==='ignored'?'/api/unignore':'/api/ignore',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sid})});closeModal();loadStats();loadList();}));
const oldA=document.getElementById('mActs');if(oldA)oldA.remove();acts.id='mActs';ctr.after(acts);document.getElementById('modal').classList.add('open');lucide.createIcons();}
function closeModal(){document.getElementById('modal').classList.remove('open');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

function switchTab(n){document.querySelectorAll('.tab-btn').forEach(b=>{const a=b.dataset.tab===n;b.classList.toggle('!text-blue-500',a);b.classList.toggle('!border-b-2',a);b.classList.toggle('!border-blue-500',a);});document.querySelectorAll('.tab-panel').forEach(p=>p.classList.toggle('active',p.id==='tab-'+n));if(n==='settings')loadSet();}

// ── Settings (Editable) ──
async function loadSet(){const cfg=await api('/config');const f=document.getElementById('setForm');f.replaceChildren();
const sec=(title,ic)=>{const s=document.createElement('div');s.className='bg-gray-50 dark:bg-slate-800/30 border border-gray-200 dark:border-slate-800 rounded-xl p-5 mb-4';s.innerHTML=`<h3 class="text-sm font-semibold text-gray-900 dark:text-slate-200 mb-4 flex items-center gap-2"><i data-lucide="${ic}" class="w-4 h-4"></i> ${title}</h3>`;f.appendChild(s);return s;};
const rw=(p,lbl,inp)=>{const r=document.createElement('div');r.className='flex items-center justify-between gap-4 py-2';const l=document.createElement('label');l.className='text-xs text-gray-500 dark:text-slate-400 min-w-[100px]';l.textContent=lbl;r.append(l,inp);p.appendChild(r);};
const ti=(v,id)=>{const i=document.createElement('input');i.type='text';i.id=id;i.value=v||'';i.className='flex-1 px-3 py-1.5 text-xs bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 rounded-lg text-gray-900 dark:text-slate-200 focus:outline-none focus:border-blue-500';return i;};
const pi=(v,id)=>{const i=ti('',id);i.type='password';if(v){i.placeholder=v.substring(0,Math.min(v.length,12))+'••••••';i.dataset.hasValue='1';}return i;};
const si=(opts,v,id)=>{const s=document.createElement('select');s.id=id;s.className='flex-1 px-3 py-1.5 text-xs bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 rounded-lg text-gray-900 dark:text-slate-200 focus:outline-none focus:border-blue-500';opts.forEach(o=>{const opt=document.createElement('option');opt.value=o;opt.textContent=o;if(o===v)opt.selected=true;s.appendChild(opt);});return s;};

const bs=sec(t('basic'),'user');
rw(bs,t('lang'),si(['en','zh-CN','zh-TW'],cfg.lang||'en','cLang'));
rw(bs,t('device'),ti(cfg.device_name,'cDev'));
rw(bs,t('syncDir'),ti(cfg.sync_dir,'cDir'));

const as=sec(t('adapterSec'),'upload-cloud');
const an=cfg.output?.adapter||'fns';
const aSel=si(['fns','local','git','server'],an,'cAdp');
rw(as,t('adapterType'),aSel);
const af=document.createElement('div');af.id='aFields';as.appendChild(af);
function renderAF(n){const c2=document.getElementById('aFields');c2.replaceChildren();const ac=cfg.output?.[n]||cfg.output||{};
if(n==='fns'){rw(c2,t('url'),ti(ac.url,'cFUrl'));rw(c2,t('token'),pi(ac.token||'','cFTok'));rw(c2,t('vault'),ti(ac.vault,'cFVlt'));}
else if(n==='local'){rw(c2,t('path'),ti(ac.path,'cLPth'));}
else if(n==='git'){rw(c2,t('repo'),ti(ac.repo_path,'cGRpo'));const tg=document.createElement('input');tg.type='checkbox';tg.id='cGPsh';tg.checked=!!ac.auto_push;tg.className='w-4 h-4 accent-blue-500';rw(c2,t('autoPush'),tg);}
else if(n==='server'){rw(c2,t('url'),ti(ac.url,'cSUrl'));rw(c2,t('token'),pi(ac.token||'','cSTok'));}}
renderAF(an);aSel.onchange=()=>renderAF(aSel.value);

const br=document.createElement('div');br.className='flex gap-2 mt-4';
const svB=document.createElement('button');svB.className='flex items-center gap-1.5 px-4 py-2 text-xs rounded-lg bg-blue-500 text-white hover:bg-blue-600 transition-colors';svB.innerHTML=`<i data-lucide="save" class="w-3.5 h-3.5"></i> ${t('save')}`;svB.onclick=saveSet;
const tsB=document.createElement('button');tsB.className='flex items-center gap-1.5 px-4 py-2 text-xs rounded-lg border border-gray-200 dark:border-slate-700 text-gray-600 dark:text-slate-300 hover:border-blue-400 transition-colors';tsB.innerHTML=`<i data-lucide="wifi" class="w-3.5 h-3.5"></i> ${t('test')}`;tsB.onclick=testConn;
const stMsg=document.createElement('span');stMsg.id='sStatus';stMsg.className='text-xs self-center ml-2';
br.append(svB,tsB,stMsg);f.appendChild(br);lucide.createIcons();}

async function saveSet(){const adp=document.getElementById('cAdp').value;const nc={lang:document.getElementById('cLang').value,device_name:document.getElementById('cDev').value,sync_dir:document.getElementById('cDir').value,output:{adapter:adp}};
if(adp==='fns'){const tk=document.getElementById('cFTok').value;nc.output.fns={url:document.getElementById('cFUrl').value,vault:document.getElementById('cFVlt').value};if(tk)nc.output.fns.token=tk;}
else if(adp==='local'){nc.output.local={path:document.getElementById('cLPth').value};}
else if(adp==='git'){nc.output.git={repo_path:document.getElementById('cGRpo').value,auto_push:document.getElementById('cGPsh').checked};}
else if(adp==='server'){const tk=document.getElementById('cSTok').value;nc.output.server={url:document.getElementById('cSUrl').value};if(tk)nc.output.server.token=tk;}
await fetch('/api/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(nc)});
lang=nc.lang;applyLang();const s=document.getElementById('sStatus');s.textContent='✅ '+t('saved');s.className='text-xs self-center ml-2 text-emerald-500';setTimeout(()=>{s.textContent='';},2000);}

async function testConn(){const s=document.getElementById('sStatus');s.textContent='⏳ '+t('testing');s.className='text-xs self-center ml-2 text-amber-500';
try{const r=await fetch('/api/test',{method:'POST'});const res=await r.json();s.textContent=res.ok?'✅ '+t('ok'):'❌ '+t('fail');s.className='text-xs self-center ml-2 '+(res.ok?'text-emerald-500':'text-red-500');}catch(e){s.textContent='❌ '+t('fail');s.className='text-xs self-center ml-2 text-red-500';}}

(async()=>{try{const cfg=await api('/config');if(cfg.lang&&T[cfg.lang])lang=cfg.lang;}catch(e){}
theme=localStorage.getItem('aichatlog-theme')||'auto';applyTheme();updTheme();applyLang();switchTab('conversations');loadStats();loadList();lucide.createIcons();})();
</script>
</body>
</html>
