name: Server CI

on:
  push:
    paths:
      - 'server/**'
      - 'protocol/**'
      - '.github/workflows/server-ci.yml'
  pull_request:
    paths:
      - 'server/**'
      - 'protocol/**'
      - '.github/workflows/server-ci.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: server/go.sum

      - name: Build server
        working-directory: server
        run: CGO_ENABLED=1 CGO_CFLAGS="-DSQLITE_ENABLE_FTS5" CGO_LDFLAGS="-lm" go build -o aichatlog-server ./cmd/server

      - name: Verify binary runs
        working-directory: server
        run: ./aichatlog-server --help || true
