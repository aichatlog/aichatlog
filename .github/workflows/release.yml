name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build server binary
        working-directory: server
        run: CGO_ENABLED=1 CGO_CFLAGS="-DSQLITE_ENABLE_FTS5" go build -o aichatlog-server ./cmd/server

      - name: Build Docker image
        working-directory: server
        run: docker build -t aichatlog/server:latest .

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: aichatlog-server-linux-amd64
          path: server/aichatlog-server

  validate-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate plugin
        run: python3 -c "import ast; ast.parse(open('plugins/claude-code/.claude-plugin/scripts/aichatlog.py').read()); print('OK')"
