name: Plugin CI

on:
  push:
    paths:
      - 'plugins/**'
      - 'server/**'
      - 'protocol/**'
      - '.github/workflows/plugin-ci.yml'
  pull_request:
    paths:
      - 'plugins/**'
      - 'server/**'
      - 'protocol/**'
      - '.github/workflows/plugin-ci.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: server/go.sum

      - name: Syntax check
        run: |
          python3 -c "import ast; ast.parse(open('plugins/claude-code/.claude-plugin/scripts/aichatlog.py').read()); print('aichatlog.py OK')"
          python3 -c "import ast; ast.parse(open('plugins/claude-code/src/aichatlog/core.py').read()); print('core.py OK')"

      - name: Install plugin
        run: |
          cd plugins/claude-code
          pip install -e .

      - name: Build server binary (for integration tests)
        working-directory: server
        run: CGO_ENABLED=1 CGO_CFLAGS="-DSQLITE_ENABLE_FTS5" CGO_LDFLAGS="-lm" go build -o aichatlog-server ./cmd/server

      - name: Run plugin tests (unit + integration)
        run: python3 plugins/claude-code/tests/test_plugin.py
